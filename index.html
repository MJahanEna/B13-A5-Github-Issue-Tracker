<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!--           tailwind+daisy          -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>

    <script>
      function Login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        if (username === "admin" && password === "admin123") {
          window.location.href = "main.html";
        } else {
          alert("Invalid credentials!");
        }
      }
    </script>
  </head>  
  <body class="min-h-screen flex justify-center items-center">
    <div class="w-full max-w-lg bg-white rounded-2xl shadow-lg py-8 px-6">
      <div class="text-center mb-6">
        <img src="assets/github-logo.png" class="mx-auto" />
        <h1 class="text-2xl font-semibold mt-6">GitHub Issues Tracker</h1>
        <h2 class="text-base text-gray-500">Sign in to manage your issues</h2>
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-base font-medium">Username</label>
        <input
          type="text"
          id="username"
          class="input w-full"
          placeholder="Enter Username"
        />
        <p class="text-sm text-[#4A00FF]">Default: admin</p>

        <label class="text-base font-medium mt-4">Password</label>
        <input
          type="password"
          id="password"
          class="input w-full"
          placeholder="Enter Password"
        />
        <p class="text-sm text-[#4A00FF]">Default: admin123</p>

        <button
          onclick="Login()"
          class="btn bg-[#4A00FF] border-none text-white w-full mt-6 mb-6"
        >
          Sign In
        </button>

        <div class="flex items-center gap-2">
          <div class="border-t border-gray-300 flex-1"></div>
          <span class="text-base">OR</span>
          <div class="border-t border-gray-300 flex-1"></div>
        </div>

        <p class="text-sm text-gray-400 text-center mt-4 mb-4">
          Demo Credentials
        </p>

        <div class="bg-[#F8FAFC] rounded-lg w-full p-4">
          <p class="text-base text-center">
            <span class="font-semibold">Username: </span> admin <br />
            <span class="font-semibold">Password: </span> admin123
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
