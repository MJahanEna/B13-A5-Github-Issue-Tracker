<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
      .filter-btn.active {
        background-color: #4a00ff;
        color: white;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC]">
    <nav class="flex justify-between px-20 py-4 bg-white h-[78px] shadow-md">
      <div class="flex items-center">
        <img
          src="./assets/github-logo.png"
          class="w-[2.25rem] h-[2.3125rem] object-cover mr-4"
        />
        <h1 class="font-semibold text-[24px]">GitHub Issues Tracker</h1>
      </div>
      <div class="flex items-center">
        <div class="relative">
          <i
            class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none z-10"
          ></i>
          <input
            id="searchInput"
            type="text"
            class="input h-[2.75rem] border-gray-200 pl-10 text-[#64748b]"
            placeholder="Search issues..."
          />
        </div>
        <button class="btn bg-[#4A00FF] border-none text-white ml-4">
          + New Issues
        </button>
      </div>
    </nav>

    <section
      class="flex p-6 bg-white w-[1110px] h-[88px] shadow-md mt-[60px] mx-auto rounded-xl"
    >
      <button
        id="filterAllBtn"
        class="btn filter-btn active mr-2 w-[120px] h-[40px]"
        onclick="filterIssues('all')"
      >
        All
      </button>
      <button
        id="filterOpenBtn"
        class="btn filter-btn mr-2 w-[120px] h-[40px]"
        onclick="filterIssues('open')"
      >
        Open
      </button>
      <button
        id="filterClosedBtn"
        class="btn filter-btn mr-2 w-[120px] h-[40px]"
        onclick="filterIssues('closed')"
      >
        Closed
      </button>
    </section>

    <section
      id="main"
      class="bg-white w-[1110px] shadow-md mt-[60px] mx-auto rounded-xl"
    >
      <div
        class="flex justify-between items-center p-6 border-b-2 border-gray-200"
      >
        <div class="flex">
          <div
            class="w-[50px] h-[50px] bg-[#ECE4FF] rounded-full flex items-center justify-center mr-4"
          >
            <img src="./assets/Aperture.png" />
          </div>
          <div>
            <label id="issueAmount" class="font-semibold text-[20px]"
              >0 issues</label
            >
            <p class="text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex">
          <div class="flex justify-center items-center mr-4">
            <div class="w-[12px] h-[12px] bg-[#00A96E] rounded-full mr-2"></div>
            <p>Open</p>
          </div>
          <div class="flex justify-center items-center mr-4">
            <div class="w-[12px] h-[12px] bg-[#A855F7] rounded-full mr-2"></div>
            <p>Closed</p>
          </div>
        </div>
      </div>

      <div id="Cards" class="bg-[#FBFBFB] p-6 flex flex-wrap gap-4"></div>
    </section>
    <script src="./script.js"></script>
  </body>
</html>
