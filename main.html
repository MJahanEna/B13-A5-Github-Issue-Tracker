<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
      .filter-btn.active {
        background-color: #4a00ff;
        color: white;
      }
    </style>
  </head>

  <body class="bg-[#F8FAFC]">
    <dialog id="issue_modal" class="modal">
      <div
        class="modal-box w-[700px] h-[414px] max-w-none flex flex-col justify-between p-8"
      >
        <div>
          <!-- Title -->
          <h3 id="modal-title" class="text-2xl font-bold mb-2"></h3>

          <!-- Status + meta -->
          <div class="flex items-center gap-2 mb-4">
            <span
              id="modal-status-badge"
              class="badge text-white text-sm px-3 py-1 rounded-full"
            ></span>
            <span class="text-gray-400">•</span>
            <span id="modal-meta" class="text-gray-500 text-sm"></span>
          </div>

          <!-- Labels -->
          <div id="modal-labels" class="flex flex-wrap gap-2 mb-4"></div>

          <!-- Description -->
          <p id="modal-description" class="text-gray-500 text-sm"></p>
        </div>

        <!-- Assignee + Priority box -->
        <div>
          <div class="bg-[#F8FAFC] rounded-xl p-4 flex gap-8 mb-4">
            <div>
              <p class="text-gray-400 text-sm">Assignee:</p>
              <p id="modal-assignee" class="font-bold text-sm mt-1"></p>
            </div>
            <div>
              <p class="text-gray-400 text-sm">Priority:</p>
              <div id="modal-priority" class="mt-1"></div>
            </div>
          </div>

          <!-- Close button -->
          <div class="flex justify-end">
            <form method="dialog">
              <button class="btn bg-[#4A00FF] text-white border-none w-[100px]">
                Close
              </button>
            </form>
          </div>
        </div>
      </div>
    </dialog>

    <nav
      class="flex flex-col sm:flex-row justify-between gap-4 sm:gap-0 px-4 md:px-8 lg:px-20 py-4 bg-white min-h-[78px] shadow-md"
    >
      <div class="flex items-center">
        <img
          src="./assets/github-logo.png"
          class="w-[2.25rem] h-[2.3125rem] object-cover mr-4"
        />
        <h1 class="font-semibold text-lg sm:text-[24px]">
          GitHub Issues Tracker
        </h1>
      </div>
      <div class="flex flex-col sm:flex-row items-center gap-2 sm:gap-0">
        <div class="relative w-full sm:w-auto">
          <i
            class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none z-10"
          ></i>
          <input
            id="searchInput"
            type="text"
            class="input h-[2.75rem] border-gray-200 pl-10 text-[#64748b] w-full sm:w-auto"
            placeholder="Search issues..."
          />
        </div>
        <button
          class="btn bg-[#4A00FF] border-none text-white ml-0 sm:ml-4 w-full sm:w-auto"
        >
          + New Issues
        </button>
      </div>
    </nav>

    <section
      class="flex flex-wrap gap-2 p-4 md:p-6 bg-white w-full max-w-[1110px] shadow-md mt-[60px] mx-auto rounded-xl"
    >
      <button
        id="filterAllBtn"
        class="btn filter-btn active mr-2 w-full sm:w-[120px] h-[40px]"
        onclick="filterIssues('all')"
      >
        All
      </button>
      <button
        id="filterOpenBtn"
        class="btn filter-btn mr-2 w-full sm:w-[120px] h-[40px]"
        onclick="filterIssues('open')"
      >
        Open
      </button>
      <button
        id="filterClosedBtn"
        class="btn filter-btn mr-2 w-full sm:w-[120px] h-[40px]"
        onclick="filterIssues('closed')"
      >
        Closed
      </button>
    </section>

    <section
      id="main"
      class="bg-white w-full max-w-[1110px] shadow-md mt-[60px] mx-auto rounded-xl"
    >
      <div
        class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 p-4 md:p-6 border-b-2 border-gray-200"
      >
        <div class="flex flex-col sm:flex-row items-start sm:items-center">
          <div
            class="w-[50px] h-[50px] bg-[#ECE4FF] rounded-full flex items-center justify-center mr-4 mb-2 sm:mb-0"
          >
            <img src="./assets/Aperture.png" />
          </div>
          <div>
            <label id="issueAmount" class="font-semibold text-lg md:text-[20px]"
              >0 issues</label
            >
            <p class="text-[#64748B] text-sm md:text-base">
              Track and manage your project issues
            </p>
          </div>
        </div>
        <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
          <div class="flex justify-center items-center">
            <div class="w-[12px] h-[12px] bg-[#00A96E] rounded-full mr-2"></div>
            <p class="text-sm">Open</p>
          </div>
          <div class="flex justify-center items-center">
            <div class="w-[12px] h-[12px] bg-[#A855F7] rounded-full mr-2"></div>
            <p class="text-sm">Closed</p>
          </div>
        </div>
      </div>

      <div
        id="Cards"
        class="bg-[#FBFBFB] p-4 md:p-6 flex flex-wrap gap-4 justify-center sm:justify-start"
      ></div>
    </section>
    <script src="./script.js"></script>
  </body>
</html>
